<head>

<body>

  <a href="about.html">

    個人品牌
  </a>

  <a href="projects.html">
    <img src="images/pudding-icon.png">
    作品展示
  </a>
</nav>

<div class="about-container">

  <div class="about-text">

    <div class="name-row">
      <img src="images/me.jpg" class="profile-small" id="anmiPhoto">
      <h1>ANMI</h1>
    </div>

    <p class="subtitle">Marketing Student ・ Creator</p>

    <div class="line"></div>

    <p>
      出生於2004年，本名朱安彌，來自台灣。<br>
      目前就讀於逢甲大學。<br>
      喜歡狗貓動物、爬蟲類、簡單的設計、影像與故事。<br>
      正在透過行銷、內容創作、互動體驗設計，<br>
      慢慢建立自己的作品宇宙。
    </p>

    <p>
      目前專注於：<br>
      品牌設計、數位內容、短影音企劃與行銷策略。
    </p>

  </div>

</div>

<div id="eatPopup" class="popup">
  <div class="popup-box">

    <div class="popup-title">🚨SYSTEM ALERT🚨</div>

    <p>⚠️ 請勿食用 ANMI！！</p>
    <p>否則他會缺一塊。</p>
    <p>是否確定要食用 ANMI？</p>

    <div class="popup-buttons">
      <button id="eatBtn">仍要食用</button>
      <button id="cancelBtn">放棄</button>
    </div>

  </div>
</div>

<script>
window.addEventListener("DOMContentLoaded", function(){

  const photo = document.getElementById("anmiPhoto");
  const popup = document.getElementById("eatPopup");
  const eat = document.getElementById("eatBtn");
  const cancel = document.getElementById("cancelBtn");

  photo.addEventListener("click", function(){
    popup.style.display = "flex";
  });

  cancel.addEventListener("click", function(){
    popup.style.display = "none";
  });

  eat.addEventListener("click", function(){
    photo.src = "images/me-bite.png";
    popup.style.display = "none";
  });

});
</script>

</body>
</html>
