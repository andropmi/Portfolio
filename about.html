<div id="fall-area"></div>

<script>
const fallArea = document.getElementById("fall-area");

const items = [
  "images/cherry-icon.png",
  "images/cream-icon.png",
  "images/pudding-icon.png"
];

const placed = [];
const size = 40;

function playBite(){
  const biteAudio = new Audio("music/bite.mp3");
  biteAudio.volume = 0.1;
  biteAudio.play().catch(()=>{});
}

function snap(value){
  return Math.floor(value / size) * size;
}

function settleColumn(x){
  const column = placed
    .filter(p => p.x === x)
    .sort((a,b) => b.y - a.y);

  column.forEach((p, index) => {
    p.y = window.innerHeight - size - index * size;
    p.el.style.left = p.x + "px";
    p.el.style.top = p.y + "px";
  });
}

function removePlaced(item){
  const oldX = item.x;

  item.el.remove();

  const index = placed.indexOf(item);
  if(index !== -1){
    placed.splice(index,1);
  }

  settleColumn(oldX);
}

function checkNearbySame(item){
  const target = placed.find(p => {
    if(p === item) return false;

    const closeX = Math.abs(p.x - item.x) <= size;
    const closeY = Math.abs(p.y - item.y) <= size;

    return closeX && closeY && p.type === item.type;
  });

  if(target){
    removePlaced(item);
    removePlaced(target);
    return true;
  }

  return false;
}

function enableDrag(item){
  let dragging = false;
  let moved = false;

  item.el.addEventListener("mousedown", function(e){
    dragging = true;
    moved = false;
    item.el.classList.add("dragging");
  });

  document.addEventListener("mousemove", function(e){
    if(!dragging) return;

    moved = true;

    item.el.style.left = e.clientX - size / 2 + "px";
    item.el.style.top = e.clientY - size / 2 + "px";
  });

  document.addEventListener("mouseup", function(e){
    if(!dragging) return;

    dragging = false;
    item.el.classList.remove("dragging");

    if(!moved){
      removePlaced(item);
      return;
    }

    item.x = snap(e.clientX - size / 2);
    item.y = snap(e.clientY - size / 2);

    item.el.style.left = item.x + "px";
    item.el.style.top = item.y + "px";

    checkNearbySame(item);
    settleColumn(item.x);
  });
}

function createItem(){
  const img = document.createElement("img");
  const type = Math.floor(Math.random() * items.length);

  img.src = items[type];
  img.className = "fall-item";

  let x = snap(Math.random() * (window.innerWidth - size));
  let y = -size;
  let speed = 2;

  img.style.left = x + "px";
  img.style.top = y + "px";

  fallArea.appendChild(img);

  function drop(){
    const nextY = y + speed;

    const hitFloor = nextY >= window.innerHeight - size;

    const hitItem = placed.find(p => {
      return p.x === x && nextY + size >= p.y;
    });

    if(hitFloor || hitItem){
      y = hitItem ? hitItem.y - size : window.innerHeight - size;

      img.style.top = y + "px";

      const newItem = {
        x: x,
        y: y,
        type: type,
        el: img
      };

      placed.push(newItem);
      enableDrag(newItem);
      checkNearbySame(newItem);
      settleColumn(x);

      return;
    }

    y = nextY;
    img.style.top = y + "px";

    requestAnimationFrame(drop);
  }

  drop();
}

setInterval(createItem, 1200);
</script>

<script>
window.addEventListener("DOMContentLoaded", function(){

  const bgm = document.getElementById("bgm");
  const photo = document.getElementById("anmiPhoto");
  const popup = document.getElementById("eatPopup");
  const eat = document.getElementById("eatBtn");
  const cancel = document.getElementById("cancelBtn");

  bgm.volume = 0.08;

  bgm.play().catch(function(){
    document.addEventListener("click", function(){
      bgm.play().catch(()=>{});
    }, {once:true});
  });

  photo.addEventListener("click", function(){
    bgm.pause();
    popup.style.display = "flex";
  });

  cancel.addEventListener("click", function(){
    popup.style.display = "none";
    bgm.play().catch(()=>{});
  });

  eat.addEventListener("click", function(){
    playBite();

    photo.src = "images/me-bite.png";
    popup.style.display = "none";

    bgm.play().catch(()=>{});
  });

  document.addEventListener("click", function(e){
    const link = e.target.closest("a");

    if(link){
      const clickAudio = new Audio("music/click.mp3");
      clickAudio.volume = 0.5;
      clickAudio.play().catch(()=>{});

      e.preventDefault();

      setTimeout(function(){
        window.location.href = link.href;
      }, 600);
    }
  });

});
</script>
