<script>

const bgm =
document.getElementById("bgm");

bgm.volume = 0.08;

document.addEventListener(

"click",

function(e){

const link =
e.target.closest("a");

if(bgm && bgm.paused){

bgm.play().catch(()=>{});

}

const clickAudio =
new Audio(
"music/click.mp3"
);

clickAudio.volume = 0.5;

clickAudio.play().catch(()=>{});

if(link && !link.target){

e.preventDefault();

setTimeout(function(){

window.location.href =
link.href;

},600);

}

}

);

</script>
